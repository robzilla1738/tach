name: release

# Builds and publishes prebuilt binaries on every `v*` tag, plus the crates.io
# release. `workflow_dispatch` exists so the whole pipeline can be dry-run
# (build + package, no publish) before cutting a real tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            run_tests: true
          - os: macos-14
            target: x86_64-apple-darwin
            run_tests: false # cross-compiled on the arm64 runner
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            run_tests: true # musl target runs natively on the glibc host
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            run_tests: true
    steps:
      - uses: actions/checkout@v4

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Test (native targets)
        if: matrix.run_tests
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "$GITHUB_REF_NAME" = "$GITHUB_REF" ] || true
          case "$GITHUB_REF" in refs/tags/*) ;; *) VERSION="dev-${GITHUB_SHA::8}" ;; esac
          NAME="perdure-${VERSION}-${{ matrix.target }}"
          mkdir "$NAME"
          cp "target/${{ matrix.target }}/release/perdure" "$NAME/"
          cp README.md LICENSE* "$NAME/" 2>/dev/null || cp README.md "$NAME/"
          tar czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v',''
          if ("$env:GITHUB_REF" -notlike 'refs/tags/*') { $version = "dev-" + $env:GITHUB_SHA.Substring(0,8) }
          $name = "perdure-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/perdure.exe" $name/
          Copy-Item README.md $name/
          Compress-Archive -Path $name -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash + "  $name.zip" | Out-File -Encoding ascii "$name.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: perdure-${{ matrix.target }}
          path: |
            perdure-*.tar.gz
            perdure-*.tar.gz.sha256
            perdure-*.zip
            perdure-*.zip.sha256

  release:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Collect checksums
        run: |
          cd artifacts
          cat *.sha256 > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "perdure $GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/perdure-*.tar.gz artifacts/perdure-*.zip artifacts/SHA256SUMS

  publish-crate:
    name: publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
