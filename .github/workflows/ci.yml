name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Unit + integration tests
        run: cargo test --verbose

      - name: End-to-end demo (red → green)
        run: bash scripts/e2e.sh

      - name: End-to-end goal runtime (crash → resume → replay)
        run: bash scripts/goal_e2e.sh

      - name: End-to-end action layer (approve → crash → resume → one refund → replay)
        run: bash scripts/action_e2e.sh

      - name: End-to-end plan language (loop → per-duplicate approval → mid-loop crash → exactly-once)
        run: bash scripts/plan_e2e.sh

      - name: End-to-end user-authored plan goal (scaffold → check → crash → snapshot-beats-live-edit → replay)
        run: bash scripts/user_plan_e2e.sh

      - name: "End-to-end guard (existing repo: adopt → verify → crash/resume → commit → out-of-scope reject → replay)"
        run: bash scripts/guard_e2e.sh

      - name: End-to-end agent interface (generate AGENTS.md → schema-matched context/next/verify → repairable rejection → finalize ≡ commit)
        run: bash scripts/agent_interface_e2e.sh

      - name: Tach format check (corpus)
        run: |
          for d in corpus/*/; do
            ( cd "$d" && "$GITHUB_WORKSPACE/target/release/tach" fmt --check )
          done

      - name: Schemas are valid JSON and match emitted samples
        run: |
          BIN="$GITHUB_WORKSPACE/target/release/tach"
          for name in diagnostic patch event goal run approval receipt bench test \
                      guard-context guard-status guard-diff guard-verify guard-commit \
                      guard-next agent-context; do
            "$BIN" schema "$name" | python3 -c 'import sys, json; json.load(sys.stdin)'
          done
          echo "all published schemas are valid JSON"
